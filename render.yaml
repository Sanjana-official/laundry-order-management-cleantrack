# render.yaml — Render.com deployment config
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cleantrack
    runtime: node
    plan: free           # upgrade to starter ($7/mo) for production
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000       # Render assigns this automatically
      - key: MONGODB_URI
        sync: false        # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure value
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_ORIGIN
        value: https://cleantrack.onrender.com  # update after first deploy